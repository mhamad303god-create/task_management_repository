<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيج المهام - لوحة التحكم</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- متغيرات CSS العالمية (Global CSS Variables) --- */
        :root {
            --bg-primary: linear-gradient(135deg, #2c2416 0%, #3a3023 100%);
            --bg-card: rgba(58, 48, 35, 0.7);
            --text-primary: #f4f1e8;
            --text-secondary: #d1d5db;
            --accent-blue: #3b82f6;
            --accent-orange: #d97706;
            --accent-gold: #fbbf24;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        /* --- أساسيات الصفحة --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- شريط التنقل --- */
        .navbar {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .navbar h1 {
            font-size: 1.8rem;
            font-weight: 500;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .navbar .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: var(--shadow-md);
        }

        /* --- البطاقات الإحصائية --- */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* --- منطقة المهام --- */
        .tasks-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .tasks-column {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .column-header h2 {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .add-task-btn {
            background: linear-gradient(135deg, var(--accent-orange), #ea580c);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4);
        }

        .add-task-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 25px rgba(217, 119, 6, 0.6);
        }

        /* --- عنصر المهمة --- */
        .task-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow-md);
            animation: taskGrowIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        @keyframes taskGrowIn {
            0% { opacity: 0; transform: scale(0.3) translateY(-20px); filter: blur(10px); }
            50% { filter: blur(2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .task-item:hover {
            transform: translateX(-5px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-lg);
        }

        .task-content h3 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--accent-blue);
            margin-bottom: 5px;
        }

        .task-content p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .complete-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .complete-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: scale(1.1) rotate(10deg);
        }

        .task-item.completed {
            animation: taskComplete 0.8s ease-out forwards;
        }

        @keyframes taskComplete {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, transparent 70%); }
            100% { transform: scale(0); opacity: 0; filter: blur(10px); }
        }

        .golden-sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-gold);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
        }

        @keyframes sparkle {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* --- مربع الحوار (Modal) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            color: var(--text-secondary);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), #2563eb);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- شريط التنقل -->
        <nav class="navbar">
            <h1>نسيج المهام</h1>
            <div class="user-info">
                <span>أهلاً، محمد</span>
                <div class="user-avatar">م</div>
            </div>
        </nav>

        <!-- البطاقات الإحصائية -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-number" id="total-tasks">0</div>
                <div class="stat-label">المهام الإجمالية</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-number" id="pending-tasks">0</div>
                <div class="stat-label">المهام قيد الانتظار</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-number" id="completed-tasks">0</div>
                <div class="stat-label">المهام المكتملة</div>
            </div>
        </div>

        <!-- منطقة المهام -->
        <div class="tasks-section">
            <!-- قائمة المهام قيد الانتظار -->
            <div class="tasks-column">
                <div class="column-header">
                    <h2>قيد الانتظار</h2>
                    <button class="add-task-btn" onclick="openModal()">+ مهمة جديدة</button>
                </div>
                <div id="pending-list">
                    <!-- المهام ستضاف هنا بواسطة JavaScript -->
                </div>
            </div>

            <!-- قائمة المهام المكتملة -->
            <div class="tasks-column">
                <div class="column-header">
                    <h2>مكتملة</h2>
                </div>
                <div id="completed-list">
                    <!-- المهام المكتملة ستظهر هنا -->
                </div>
            </div>
        </div>
    </div>

    <!-- مربع الحوار لإضافة المهام -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>إضافة مهمة جديدة</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">عنوان المهمة</label>
                    <input type="text" id="task-title" required>
                </div>
                <div class="form-group">
                    <label for="task-desc">الوصف</label>
                    <textarea id="task-desc" required></textarea>
                </div>
                <button type="submit" class="submit-btn">إضافة المهمة</button>
            </form>
        </div>
    </div>

    <script>
        // إدارة حالة التطبيق
        let tasks = {
            pending: [
                { id: 1, title: 'تصميم واجهة المستخدم', desc: 'إنشاء المخططات الأولية للواجهة' },
                { id: 2, title: 'بناء هيكل HTML', desc: 'تطوير هيكل الصفحة الأساسي' },
                { id: 3, title: 'تطبيق التصميم بالـ CSS', desc: 'تحويل التصميم إلى كود CSS' }
            ],
            completed: [
                { id: 4, title: 'تثبيت بيئة العمل', desc: 'إعداد المشاريع والأدوات' }
            ]
        };

        // دالة لتحديث الإحصائيات
        function updateStats() {
            document.getElementById('total-tasks').textContent = tasks.pending.length + tasks.completed.length;
            document.getElementById('pending-tasks').textContent = tasks.pending.length;
            document.getElementById('completed-tasks').textContent = tasks.completed.length;
        }

        // دالة لإنشاء عنصر المهمة
        function createTaskElement(task, isPending = true) {
            const taskItem = document.createElement('div');
            taskItem.className = 'task-item';
            taskItem.dataset.taskId = task.id;
            taskItem.innerHTML = `
                <div class="task-content">
                    <h3>${task.title}</h3>
                    <p>${task.desc}</p>
                </div>
                <button class="complete-btn" onclick="completeTask(${task.id})">✓</button>
            `;
            return taskItem;
        }

        // دالة لعرض المهام
        function renderTasks() {
            const pendingList = document.getElementById('pending-list');
            const completedList = document.getElementById('completed-list');

            // مس القوائم الحالية
            pendingList.innerHTML = '';
            completedList.innerHTML = '';

            // عرض المهام قيد الانتظار
            tasks.pending.forEach(task => {
                const taskElement = createTaskElement(task, true);
                // إضافة الأنيميشن حسب الترتيب
                taskElement.style.animationDelay = `${tasks.pending.indexOf(task) * 0.1}s`;
                pendingList.appendChild(taskElement);
            });

            // عرض المهام المكتملة
            tasks.completed.forEach(task => {
                const taskElement = createTaskElement(task, false);
                taskElement.querySelector('.complete-btn').style.display = 'none'; // إخفاء زر الإنجاز
                completedList.appendChild(taskElement);
            });
            
            updateStats();
        }

        // دالة لإكمال المهمة
        function completeTask(taskId) {
            const taskIndex = tasks.pending.findIndex(t => t.id === taskId);
            if (taskIndex > -1) {
                const task = tasks.pending.splice(taskIndex, 1)[0];
                tasks.completed.unshift(task); // إضافة إلى بداية القائمة المكتملة

                const taskElement = document.querySelector(`[data-task-id="${taskId}"]`);
                taskElement.classList.add('completed');
                
                // إنشاء تأثير "غبار ذهبي"
                createGoldenSparkles(taskElement);

                setTimeout(() => {
                    renderTasks();
                }, 800);
            }
        }

        // دالة إنشاء الغبار الذهبي
        function createGoldenSparkles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'golden-sparkle';
                const angle = (Math.PI * 2 * i) / 15;
                const distance = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                sparkle.style.setProperty('--tx', `${tx}px`);
                sparkle.style.setProperty('--ty', `${ty}px`);
                sparkle.style.left = '50%';
                sparkle.style.top = '50%';
                
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        // دوال مربع الحوار (Modal)
        function openModal() {
            document.getElementById('task-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('task-modal').style.display = 'none';
            document.getElementById('task-form').reset();
        }

        // عند النقر خارج مربع الحوار، أغلقه
        window.onclick = function(event) {
            const modal = document.getElementById('task-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // معالجة إرسال النموذج
        document.getElementById('task-form').onsubmit = function(e) {
            e.preventDefault();
            
            const title = document.getElementById('task-title').value;
            const desc = document.getElementById('task-desc').value;
            
            const newTask = {
                id: Date.now(), // استخدام الطابع الزمني كمعرف فريد
                title: title,
                desc: desc
            };

            tasks.pending.unshift(newTask); // إضافة إلى بداية القائمة
            renderTasks();
            closeModal();
        }

        // عرض المهام عند تحميل الصفحة
        renderTasks();
    </script>

</body>
</html>
