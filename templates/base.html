{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نسيج المهام{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->

<link rel="stylesheet" href="{% static 'style.css' %}">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% csrf_token %}

    <!-- Background Blobs -->
    <div class="bg-blobs">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>

    <!-- Background Canvas for Particles -->
    <canvas id="bg-canvas"></canvas>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- JavaScript -->
    <script>
        // Django User Context
        window.DJANGO_USER = {
            username: "{{ request.user.username|default:'' }}",
            email: "{{ request.user.email|default:'' }}",
            firstName: "{{ request.user.first_name|default:'' }}",
            lastName: "{{ request.user.last_name|default:'' }}",
            isAuthenticated: {{ request.user.is_authenticated|yesno:'true,false' }},
            isStaff: {{ request.user.is_staff|yesno:'true,false' }},
            isSuperuser: {{ request.user.is_superuser|yesno:'true,false' }},
        };
        window.DJANGO_ADMIN_URL = "/admin/";
    </script>
    <script src="{% static 'main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
